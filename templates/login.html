{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - 8th Sem Notes</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="bg-gradient">

    <!-- Top-right admin circle icon -->
    <a href="/admin/" class="admin-fab" title="Administrator panel">
        <span>👨🏼‍💼</span>
    </a>

    <div class="login-center">

        <div class="lamp-login-layout">

            <!-- Stand lamp with pull chain -->
            <div class="stand-lamp" id="lamp-toggle">
                <div class="lamp-base"></div>
                <div class="lamp-stand"></div>
                <div class="lamp-shade"></div>

                <!-- Pull cord -->
                <div class="lamp-cord-wrapper">
                    <div class="lamp-cord-line"></div>
                    <div class="lamp-cord-ball"></div>
                </div>
            </div>

            <!-- Login card (hidden by default, visible on pull) -->
            <div class="login-wrapper glass-card" id="login-card">
                <div class="login-header">
                    <h2>Welcome back 👋</h2>
                    <p>Pull the cord to turn on the lamp and login.</p>
                </div>

                {% if msg %}
                    <p class="error">{{ msg }}</p>
                {% endif %}

                <form method="post" class="auth-form">
                    {% csrf_token %}

                    <div class="form-row">
                        <label for="{{ form.username.id_for_label }}">Username</label>
                        <div class="form-field">
                            {{ form.username }}
                            {{ form.username.errors }}
                        </div>
                    </div>

                    <div class="form-row">
                        <label for="{{ form.password.id_for_label }}">Password</label>
                        <div class="form-field">
                            {{ form.password }}
                            {{ form.password.errors }}
                        </div>
                    </div>

                    <button type="submit" class="btn secondary full">Login</button>
                </form>

                <p class="register-link">
                    New user? <a href="{% url 'register' %}">Create an account</a>
                </p>
            </div>

        </div>
    </div>
</div>

<script>
  // Pull chain se form show/hide + lamp light toggle
  const lamp   = document.getElementById('lamp-toggle');
  const card   = document.getElementById('login-card');

  if (lamp && card) {
    lamp.addEventListener('click', () => {
      lamp.classList.toggle('on');          // lamp light on/off
      card.classList.toggle('visible');     // form show/hide
    });
  }
</script>
</body>
</html>
